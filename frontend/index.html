<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Browser Platform</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="hero">

    <h1>🚀 Product Browser Platform</h1>

    <p>
        Browse, search and analyze 200,000+ products
        with high-performance cursor pagination.
    </p>

</div>

<div class="container">

    <div class="stats-grid">

        <div class="stat-card">
            <h2 id="totalProducts">0</h2>
            <p>Total Products</p>
        </div>

        <div class="stat-card">
            <h2 id="electronicsCount">0</h2>
            <p>Electronics</p>
        </div>

        <div class="stat-card">
            <h2 id="booksCount">0</h2>
            <p>Books</p>
        </div>

        <div class="stat-card">
            <h2 id="fashionCount">0</h2>
            <p>Fashion</p>
        </div>

        <div class="stat-card">
            <h2 id="sportsCount">0</h2>
            <p>Sports</p>
        </div>

        <div class="stat-card">
            <h2 id="homeCount">0</h2>
            <p>Home</p>
        </div>

    </div>

    <div class="controls">

        <input
            type="text"
            id="search"
            placeholder="🔍 Search products..."
        >

        <select id="category">
            <option value="">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="books">Books</option>
            <option value="fashion">Fashion</option>
            <option value="sports">Sports</option>
            <option value="home">Home</option>
        </select>

        <select id="sort">
            <option value="newest">Newest First</option>
            <option value="price_asc">Price Low → High</option>
            <option value="price_desc">Price High → Low</option>
        </select>

        <button onclick="loadProducts(true)">
            Apply Filters
        </button>

    </div>

    <div id="loader">
        Loading products...
    </div>

    <div id="emptyState" class="empty-state">
        🔍 No products found
    </div>

    <div id="grid" class="grid"></div>

    <button class="load-btn" onclick="nextPage()">
        Load More Products
    </button>

</div>

<div id="productModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">
            &times;
        </span>

        <h2>Product Details</h2>

        <div id="productDetails"></div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
